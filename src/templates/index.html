<!DOCTYPE html>
<html>
<head>
    <title>策略持仓查看</title>
    <meta charset="utf-8">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        .strategy-section {
            margin-bottom: 30px;
            border: 1px solid #ddd;
            padding: 15px;
            border-radius: 5px;
        }
        .strategy-name {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #333;
        }
        .update-time {
            font-size: 12px;
            color: #666;
            margin-bottom: 10px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }
        th, td {
            padding: 8px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: #f5f5f5;
            font-weight: bold;
        }
        .refresh-btn {
            margin-bottom: 20px;
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 10px;
        }
        .refresh-btn:hover {
            background-color: #45a049;
        }
        .refresh-strategies-btn {
            margin-bottom: 20px;
            padding: 10px 20px;
            background-color: #ff9800;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 10px;
        }
        .refresh-strategies-btn:hover {
            background-color: #e68900;
        }
        .total-positions {
            margin-bottom: 30px;
            padding: 15px;
            background-color: #f8f9fa;
            border-radius: 5px;
        }
        .section-title {
            color: #2c3e50;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #eee;
        }
        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }
        .error {
            color: #dc3545;
            padding: 10px;
            background-color: #f8d7da;
            border-radius: 4px;
            margin-bottom: 20px;
        }
        .success {
            color: #155724;
            padding: 10px;
            background-color: #d4edda;
            border-radius: 4px;
            margin-bottom: 20px;
        }
        .negative-volume {
            color: #dc3545;
            font-weight: bold;
        }
        .positive-volume {
            color: #28a745;
            font-weight: bold;
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.4);
        }
        .modal-content {
            background-color: #fefefe;
            margin: 15% auto;
            padding: 20px;
            border: 1px solid #888;
            border-radius: 5px;
            width: 300px;
            text-align: center;
        }
        .modal-input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .modal-btn {
            padding: 10px 20px;
            margin: 5px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .modal-btn-confirm {
            background-color: #4CAF50;
            color: white;
        }
        .modal-btn-cancel {
            background-color: #f44336;
            color: white;
        }
    </style>
</head>
<body>
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h1>策略持仓信息</h1>
        <div>
            <a href="/adjustment" style="margin-right: 15px; color: #007bff; text-decoration: none; font-size: 16px;">持仓调整 →</a>
            <a href="/password" style="margin-right: 15px; color: #007bff; text-decoration: none; font-size: 16px;">密码管理 →</a>
            <button class="refresh-btn" onclick="refreshData()">刷新数据</button>
            <button class="refresh-strategies-btn" onclick="showRefreshStrategiesModal()">刷新策略时间</button>
        </div>
    </div>
    
    <div id="message-container"></div>
    
    <div class="total-positions">
        <h2 class="section-title">总持仓</h2>
        <table>
            <thead>
                <tr>
                    <th>股票代码</th>
                    <th>股票名称</th>
                    <th>总持仓</th>
                    <th>平均成本</th>
                </tr>
            </thead>
            <tbody id="total-positions-body"></tbody>
        </table>
    </div>
    
    <h2 class="section-title">策略明细</h2>
    <div id="positions-container"></div>

    <!-- 密码确认模态框 -->
    <div id="passwordModal" class="modal">
        <div class="modal-content">
            <h3>验证密码</h3>
            <p>刷新策略时间需要验证内部密码</p>
            <input type="password" id="passwordInput" class="modal-input" placeholder="请输入内部密码">
            <div>
                <button class="modal-btn modal-btn-confirm" onclick="confirmRefreshStrategies()">确认</button>
                <button class="modal-btn modal-btn-cancel" onclick="hideRefreshStrategiesModal()">取消</button>
            </div>
        </div>
    </div>

    <script>
        async function fetchData() {
            try {
                const [totalResponse, allResponse] = await Promise.all([
                    fetch('/api/v1/positions/total'),
                    fetch('/api/v1/positions/all')
                ]);
                
                const totalData = await totalResponse.json();
                const allData = await allResponse.json();
                
                return {
                    totalPositions: totalData.positions || [],
                    strategies: allData.strategies || []
                };
            } catch (error) {
                console.error('获取数据失败:', error);
                throw error;
            }
        }

        function renderTotalPositions(positions) {
            const tbody = document.getElementById('total-positions-body');
            tbody.innerHTML = positions.map(p => `
                <tr>
                    <td>${p.code}</td>
                    <td>${p.name || p.code}</td>
                    <td class="${p.total_volume >= 0 ? 'positive-volume' : 'negative-volume'}">
                        ${p.total_volume >= 0 ? '+' : ''}${p.total_volume}
                    </td>
                    <td>${p.avg_cost.toFixed(2)}</td>
                </tr>
            `).join('');
        }

        function renderStrategies(strategies) {
            return strategies.map(strategy => `
                <div class="strategy-section">
                    <div class="strategy-name">${strategy.strategy_name}</div>
                    <div class="update-time">更新时间：${strategy.update_time}</div>
                    <table>
                        <thead>
                            <tr>
                                <th>股票代码</th>
                                <th>股票名称</th>
                                <th>持仓数量</th>
                                <th>成本</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${strategy.positions.map(p => `
                                <tr>
                                    <td>${p.code}</td>
                                    <td>${p.name || p.code}</td>
                                    <td class="${p.volume >= 0 ? 'positive-volume' : 'negative-volume'}">
                                        ${p.volume >= 0 ? '+' : ''}${p.volume}
                                    </td>
                                    <td>${p.cost.toFixed(2)}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `).join('');
        }

        function showMessage(message, type = 'success') {
            const container = document.getElementById('message-container');
            const messageDiv = document.createElement('div');
            messageDiv.className = type;
            messageDiv.textContent = message;
            container.innerHTML = '';
            container.appendChild(messageDiv);
            
            // 3秒后自动隐藏消息
            setTimeout(() => {
                container.innerHTML = '';
            }, 3000);
        }

        async function refreshData() {
            const container = document.getElementById('positions-container');
            container.innerHTML = '<div class="loading">加载中...</div>';

            try {
                const data = await fetchData();
                renderTotalPositions(data.totalPositions);
                container.innerHTML = renderStrategies(data.strategies);
            } catch (error) {
                container.innerHTML = '<div class="error">加载数据失败，请稍后重试</div>';
            }
        }

        function showRefreshStrategiesModal() {
            document.getElementById('passwordModal').style.display = 'block';
            document.getElementById('passwordInput').value = '';
            document.getElementById('passwordInput').focus();
        }

        function hideRefreshStrategiesModal() {
            document.getElementById('passwordModal').style.display = 'none';
        }

        async function confirmRefreshStrategies() {
            const password = document.getElementById('passwordInput').value;
            
            if (!password) {
                showMessage('请输入密码', 'error');
                return;
            }

            try {
                const response = await fetch('/api/v1/strategies/refresh', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Internal-Password': password
                    },
                    body: JSON.stringify({})
                });

                const result = await response.json();

                if (response.ok && result.success) {
                    showMessage(`${result.message}，更新时间：${result.update_time}`, 'success');
                    hideRefreshStrategiesModal();
                    // 刷新页面数据
                    setTimeout(() => {
                        refreshData();
                    }, 1000);
                } else {
                    showMessage(result.error || '刷新失败', 'error');
                }
            } catch (error) {
                console.error('刷新策略时间失败:', error);
                showMessage('刷新策略时间失败，请稍后重试', 'error');
            }
        }

        // 页面加载完成后自动刷新数据
        document.addEventListener('DOMContentLoaded', refreshData);

        // 每60秒自动刷新一次数据
        setInterval(refreshData, 60000);

        // 点击模态框外部关闭模态框
        window.onclick = function(event) {
            const modal = document.getElementById('passwordModal');
            if (event.target === modal) {
                hideRefreshStrategiesModal();
            }
        }

        // 在密码输入框中按回车键确认
        document.getElementById('passwordInput').addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                confirmRefreshStrategies();
            }
        });
    </script>
</body>
</html>
